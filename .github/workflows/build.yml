---
name: Build

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    if: github.event.pull_request.user.login == 'proinsias'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1.316.0
        with:
          ruby-version: "3.3.5"
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build
